<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
</head>
<body>
    <h1>Forgot Password</h1>

    <form method="POST">
        <label>Enter your username:</label><br>
        <input type="text" name="username" required><br><br>

        <button type="submit">Continue</button>
    </form>

    <p>{{ message }}</p>

    <a href="/login">Back to Login</a>
</body>
</html>
