<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style1.css') }}">
</head>

<body>
    <div class="page-wrapper">
        <div class="card">
            <h1>Register</h1>
            <p class="subtitle">Create a standard user account.</p>

            <form method="POST" action="/register">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Choose password" required>
                </div>

                <button type="submit">Register</button>
            </form>

            {% if message %}
            <div class="message error">{{ message }}</div>
            {% endif %}

            <div class="link-area">
                <a href="/login">Back to Login</a>
            </div>
        </div>
    </div>
</body>

</html>
